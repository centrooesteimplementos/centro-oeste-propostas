};
const getCidades = (estado) => CIDADES[estado] || [];

function ProposalForm({proposal, sellers, currentSeller, userRole, proposals, onSave, onCancel, logoB64}) {
  const isEdit = !!proposal?.id;

  // migrate old proposals (sem items) para novo formato
  const migrateProposal = (p) => {
    if (!p) return null;
    if (p.items && p.items.length > 0) return p;
    return {
      ...p,
      estado: p.estado || 'Mato Grosso',
      docTipo: p.docTipo || 'cpf',
      items: [{
        _id: Date.now().toString(),
        product: p.product||'', brand: p.brand||'GTS do Brasil', model: p.model||'',
        finame: p.finame||'', ncm: p.ncm||'', description: p.description||'',
        productImg: p.productImg||'', deliveryTime: p.deliveryTime||'',
        totalValue: p.totalValue||'', paymentType: p.paymentType||'PIX',
        installments: p.installments||[], numInstallments: p.numInstallments||'',
        photos: p.photos||[], tradeIns: [],
      }],
    };
  };

  const [form, setForm] = useState(() => migrateProposal(proposal) || {
    id: Date.now().toString(),
    num: nextProposalNum(proposals),
    date: new Date().toISOString().slice(0,10),
    sellerId: currentSeller.id,
    clientName:'', cpf:'', docTipo:'cpf', phone:'', farm:'', city:'', estado:'Mato Grosso',
    validUntil:'', notes:'',
    status:'aguardando',
    items: [EMPTY_ITEM()],
  });

  const [pdfLoading, setPdfLoading] = useState(false);
  const [showCatalog, setShowCatalog] = useState(null);
  const [catFilter, setCatFilter] = useState('');
  const [brandFilter, setBrandFilter] = useState('');
  const photoRefs = useRef([]);

  const handleGeneratePDF = async () => {
    setPdfLoading(true);
    try {
      const s = sellers.find(x=>x.id===form.sellerId)||currentSeller;
      await generatePDF(form, s, LOGO_BRANCA_B64);
    } finally {
      setPdfLoading(false);
    }
  };

  const upd = (field, val) => setForm(f => ({...f, [field]: val}));

  // ---- Item helpers ----
  const updItem = (i, field, val) => setForm(f => {
    const items = [...f.items];
    items[i] = {...items[i], [field]: val};
    return {...f, items};
  });

  const addItem = () => setForm(f => ({...f, items: [...f.items, EMPTY_ITEM()]}));

  const removeItem = (i) => {
    if (form.items.length === 1) return;
    setForm(f => ({...f, items: f.items.filter((_,idx)=>idx!==i)}));
  };

  const selectProduct = (item, itemIdx) => {
    updItem(itemIdx, '_patch', null);
    setForm(f => {
      const items = [...f.items];
      items[itemIdx] = {...items[itemIdx],
        product: item.cat, brand: item.brand || 'GTS do Brasil', model: item.name,
        finame: item.finame, ncm: item.ncm,
        description: item.desc, productImg: item.img||'',
      };
      return {...f, items};
    });
    setShowCatalog(null);
  };

  const setNumInstallments = (itemIdx, n) => {
    const qty = Math.max(0, Math.min(60, parseInt(n)||0));
    setForm(f => {
      const items = [...f.items];
      const current = items[itemIdx].installments || [];
      const newInst = qty > current.length
        ? [...current, ...Array.from({length: qty - current.length}, ()=>({value:'', date:'', note:''}))]
        : current.slice(0, qty);
      items[itemIdx] = {...items[itemIdx], numInstallments: qty, installments: newInst};
      return {...f, items};
    });
  };

  const updInstallment = (itemIdx, i, field, val) => {
    setForm(f => {
      const items = [...f.items];
      const insts = [...(items[itemIdx].installments||[])];
      insts[i] = {...insts[i], [field]: val};
      items[itemIdx] = {...items[itemIdx], installments: insts};
      return {...f, items};
    });
  };

  const addTradeIn = (itemIdx) => {
    setForm(f => {
      const items = [...f.items];
      items[itemIdx] = {...items[itemIdx], tradeIns: [...(items[itemIdx].tradeIns||[]), EMPTY_TRADEIN()]};
      return {...f, items};
    });
  };

  const updTradeIn = (itemIdx, tiIdx, field, val) => {
    setForm(f => {
      const items = [...f.items];
      const tis = [...(items[itemIdx].tradeIns||[])];
      tis[tiIdx] = {...tis[tiIdx], [field]: val};
      items[itemIdx] = {...items[itemIdx], tradeIns: tis};
      return {...f, items};
    });
  };

  const removeTradeIn = (itemIdx, tiIdx) => {
    setForm(f => {
      const items = [...f.items];
      items[itemIdx] = {...items[itemIdx], tradeIns: items[itemIdx].tradeIns.filter((_,x)=>x!==tiIdx)};
      return {...f, items};
    });
  };

  const addTiParcela = (itemIdx, tiIdx) => {
    setForm(f => {
      const items = [...f.items];
      const tis = [...(items[itemIdx].tradeIns||[])];
      tis[tiIdx] = {...tis[tiIdx], parcelas:[...(tis[tiIdx].parcelas||[]), EMPTY_TI_PARCELA()]};
      items[itemIdx] = {...items[itemIdx], tradeIns: tis};
      return {...f, items};
    });
  };

  const updTiParcela = (itemIdx, tiIdx, pIdx, field, val) => {
    setForm(f => {
      const items = [...f.items];
      const tis = [...(items[itemIdx].tradeIns||[])];
      const parcs = [...(tis[tiIdx].parcelas||[])];
      parcs[pIdx] = {...parcs[pIdx], [field]: val};
      tis[tiIdx] = {...tis[tiIdx], parcelas: parcs};
      items[itemIdx] = {...items[itemIdx], tradeIns: tis};
      return {...f, items};
    });
  };

  const removeTiParcela = (itemIdx, tiIdx, pIdx) => {
    setForm(f => {
      const items = [...f.items];
      const tis = [...(items[itemIdx].tradeIns||[])];
      tis[tiIdx] = {...tis[tiIdx], parcelas: tis[tiIdx].parcelas.filter((_,x)=>x!==pIdx)};
      items[itemIdx] = {...items[itemIdx], tradeIns: tis};
      return {...f, items};
    });
  };

  const tradeInTotal = (item) => (item.tradeIns||[]).reduce((s,ti)=>s+parseCurrency(ti.value),0);
  const netValue = (item) => Math.max(0, parseCurrency(item.totalValue) - tradeInTotal(item));
  const tiParcelasTotal = (ti) => (ti.parcelas||[]).reduce((s,p)=>s+parseCurrency(p.valor),0);

  const handlePhoto = (e, itemIdx) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setForm(f => {
          const items = [...f.items];
          items[itemIdx] = {...items[itemIdx], photos: [...(items[itemIdx].photos||[]), ev.target.result]};
          return {...f, items};
        });
      };
      reader.readAsDataURL(file);
    });
  };

  const filteredCat = ALL_CATALOG.filter(item => {
    const matchBrand = !brandFilter || item.brand === brandFilter;
    const matchCat = !catFilter || item.cat.toLowerCase().includes(catFilter.toLowerCase()) || item.name.toLowerCase().includes(catFilter.toLowerCase());
    return matchBrand && matchCat;
  });
  const cats = [...new Set(ALL_CATALOG.filter(i => !brandFilter || i.brand===brandFilter).map(i=>i.cat))];
  const brands = [...new Set(ALL_CATALOG.map(i=>i.brand))];

  return (
    <div>
      <div className="card">
        <div className="card-title">{isEdit ? 'Editar Proposta' : 'Nova Proposta'}</div>

        {/* Cabeçalho da proposta */}
        <div className="form-grid">
          <div className="form-group">
            <label>Número da Proposta</label>
            <input value={form.num} readOnly style={{background:'#f5f5f0'}} />
          </div>
          <div className="form-group">
            <label>Data</label>
            <input type="date" value={form.date} onChange={e=>upd('date',e.target.value)} />
          </div>
          <div className="form-group">
            <label>Vendedor / Responsável</label>
            {userRole==='vendedor' ? (
              <input value={currentSeller.name} readOnly style={{background:'#f5f5f0'}} />
            ) : (
              <select value={form.sellerId} onChange={e=>upd('sellerId',e.target.value)}>
                {sellers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            )}
          </div>
          <div className="form-group">
            <label>Validade da Proposta</label>
            <input type="date" value={form.validUntil} onChange={e=>upd('validUntil',e.target.value)} />
          </div>
        </div>

        {/* Dados do cliente */}
        <div className="section-title">Dados do Cliente</div>
        <div className="form-grid">
          <div className="form-group full">
            <label>Nome do Cliente *</label>
            <input value={form.clientName} onChange={e=>upd('clientName',e.target.value)} placeholder="Nome completo" />
          </div>
          <div className="form-group">
            <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span>CPF / CNPJ</span>
              <span style={{display:'flex',gap:0,borderRadius:12,overflow:'hidden',border:'1px solid var(--verde)',fontSize:10,fontWeight:700}}>
                <button type="button"
                  onClick={()=>{ upd('docTipo','cpf'); upd('cpf',''); }}
                  style={{padding:'2px 10px',border:'none',cursor:'pointer',background:(!form.docTipo||form.docTipo==='cpf')?'var(--verde)':'transparent',color:(!form.docTipo||form.docTipo==='cpf')?'white':'var(--verde)'}}>
                  CPF
                </button>
                <button type="button"
                  onClick={()=>{ upd('docTipo','cnpj'); upd('cpf',''); }}
                  style={{padding:'2px 10px',border:'none',cursor:'pointer',background:form.docTipo==='cnpj'?'var(--verde)':'transparent',color:form.docTipo==='cnpj'?'white':'var(--verde)'}}>
                  CNPJ
                </button>
              </span>
            </label>
            <input
              value={form.cpf}
              onChange={e=>upd('cpf', maskDoc(e.target.value, form.docTipo))}
              placeholder={form.docTipo==='cnpj' ? '00.000.000/0000-00' : '000.000.000-00'}
              maxLength={form.docTipo==='cnpj' ? 18 : 14}
              inputMode="numeric"
            />
          </div>
          <div className="form-group">
            <label>Telefone</label>
            <input value={form.phone} onChange={e=>upd('phone', maskPhone(e.target.value))} placeholder="(00) 00000-0000" maxLength={15} />
          </div>
          <div className="form-group">
            <label>Fazenda</label>
            <input value={form.farm} onChange={e=>upd('farm',e.target.value)} placeholder="Nome da fazenda" />
          </div>
          <div className="form-group">
            <label>Estado</label>
            <select value={form.estado||'Mato Grosso'} onChange={e=>{upd('estado',e.target.value); upd('city','');}}>
              {ESTADOS_LIST.map(uf=><option key={uf} value={uf}>{uf}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>Cidade</label>
            <input
              list={`cidades-${form.estado||'Mato Grosso'}`}
              value={form.city||''}
              onChange={e=>upd('city',e.target.value)}
              placeholder="Digite para buscar..."
              autoComplete="off"
            />
            <datalist id={`cidades-${form.estado||'Mato Grosso'}`}>
              {getCidades(form.estado||'Mato Grosso').map(c=><option key={c} value={c}/>)}
            </datalist>
          </div>
        </div>

        {/* ITENS */}
        {form.items.map((item, itemIdx) => (
          <div key={item._id || itemIdx} style={{border:'2px solid var(--verde)',borderRadius:10,padding:16,marginTop:20,position:'relative'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:15,color:'var(--verde)'}}>
                📦 Item {itemIdx+1}{item.model ? `  -  ${item.model}` : ''}
              </div>
              {form.items.length > 1 && (
                <button className="btn btn-danger btn-sm" onClick={()=>removeItem(itemIdx)}>🗑 Remover Item</button>
              )}
            </div>

            {/* Produto */}
            <div style={{marginBottom:10}}>
              <button className="btn btn-secondary" onClick={()=>{setCatFilter('');setBrandFilter('');setShowCatalog(itemIdx);}}>
                📦 Selecionar do Catálogo GTS / Jan
              </button>
            </div>
            <div className="form-grid">
              <div className="form-group">
                <label>Categoria / Produto</label>
                <input value={item.product} onChange={e=>updItem(itemIdx,'product',e.target.value)} placeholder="Ex: Plataforma de Milho" />
              </div>
              <div className="form-group">
                <label>Marca</label>
                <input value={item.brand} onChange={e=>updItem(itemIdx,'brand',e.target.value)} />
              </div>
              <div className="form-group">
                <label>Modelo</label>
                <input value={item.model} onChange={e=>updItem(itemIdx,'model',e.target.value)} placeholder="Ex: Produttiva" />
              </div>
              <div className="form-group">
                <label>Código FINAME</label>
                <input value={item.finame} onChange={e=>updItem(itemIdx,'finame',e.target.value)} placeholder="0000.00.00.00" />
              </div>
              <div className="form-group">
                <label>NCM - Classificação Fiscal</label>
                <input value={item.ncm} onChange={e=>updItem(itemIdx,'ncm',e.target.value)} placeholder="0000.00.00" />
              </div>
              <div className="form-group">
                <label>Prazo de Entrega</label>
                <input value={item.deliveryTime} onChange={e=>updItem(itemIdx,'deliveryTime',e.target.value)} placeholder="Ex: 30 dias, Imediato" />
              </div>
              <div className="form-group full">
                <label>Descrição do Produto</label>
                <textarea value={item.description} onChange={e=>updItem(itemIdx,'description',e.target.value)} rows={4} placeholder="Descrição detalhada do produto..." />
              </div>
              <div className="form-group full">
                <label>Foto do Produto (catálogo GTS)</label>
                <div style={{display:'flex',gap:12,alignItems:'flex-start',flexWrap:'wrap'}}>
                  {item.productImg && (
                    <div style={{position:'relative',flexShrink:0}}>
                      <img src={item.productImg} alt="Produto" style={{height:100,width:'auto',maxWidth:180,objectFit:'cover',borderRadius:8,border:'2px solid var(--verde)'}}
                        onError={e=>{e.target.style.display='none';}} />
                      <button onClick={()=>updItem(itemIdx,'productImg','')}
                        style={{position:'absolute',top:-6,right:-6,background:'var(--vermelho)',color:'white',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                    </div>
                  )}
                  <div style={{flex:1,minWidth:180}}>
                    <input value={item.productImg} onChange={e=>updItem(itemIdx,'productImg',e.target.value)}
                      placeholder="URL da imagem (auto ao selecionar catálogo)" style={{marginBottom:6}} />
                    <div style={{fontSize:11,color:'var(--text2)'}}>💡 Selecione do catálogo GTS para preencher automaticamente.</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Fotos da galeria */}
            <div className="section-title" style={{marginTop:8}}>Fotos do Equipamento</div>
            <div className="photo-area" onClick={()=>photoRefs.current[itemIdx]?.click()}>
              <div>📷 Toque para adicionar fotos da galeria</div>
              <input ref={el=>photoRefs.current[itemIdx]=el} type="file" accept="image/*" multiple style={{display:'none'}}
                onChange={e=>handlePhoto(e,itemIdx)} />
            </div>
            {(item.photos||[]).length > 0 && (
              <div className="photo-preview">
                {item.photos.map((ph, pi) => (
                  <div key={pi} style={{position:'relative'}}>
                    <img src={ph} className="photo-thumb" alt={`foto ${pi+1}`} />
                    <button onClick={()=>{
                      setForm(f=>{const items=[...f.items];items[itemIdx]={...items[itemIdx],photos:items[itemIdx].photos.filter((_,x)=>x!==pi)};return{...f,items};});
                    }} style={{position:'absolute',top:-4,right:-4,background:'red',color:'white',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',fontSize:11,lineHeight:'18px',padding:0}}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Valor e Pagamento */}
            <div className="section-title" style={{marginTop:8}}>Valor e Pagamento</div>
            <div className="form-grid">
              <div className="form-group">
                <label>Valor Total</label>
                <input value={item.totalValue} onChange={e=>updItem(itemIdx,'totalValue',maskCurrency(e.target.value))} placeholder="R$ 0,00" inputMode="numeric" />
              </div>
              <div className="form-group">
                <label>Forma de Pagamento</label>
                <div className="payment-type-grid" style={{marginTop:4}}>
                  {PAYMENT_TYPES.map(pt => (
                    <div key={pt} className={`payment-chip ${item.paymentType===pt?'active':''}`} onClick={()=>updItem(itemIdx,'paymentType',pt)}>{pt}</div>
                  ))}
                </div>
              </div>
            </div>

            {item.paymentType === 'Parcelado' && (() => {
              const totalNum = parseCurrency(item.totalValue);
              const somaParc = (item.installments||[]).reduce((s,inst)=>s+parseCurrency(inst.value),0);
              const diff = Math.abs(totalNum - somaParc);
              const valid = totalNum > 0 && diff < 0.02;
              return (
                <div style={{marginTop:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10,flexWrap:'wrap'}}>
                    <label style={{fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:0}}>Nº de Parcelas</label>
                    <input type="number" min="1" max="60" value={item.numInstallments||''} onChange={e=>setNumInstallments(itemIdx,e.target.value)}
                      style={{width:80,textAlign:'center',fontWeight:700}} placeholder="Qtd." />
                    {totalNum > 0 && (item.installments||[]).length > 0 && (
                      <span style={{fontSize:12,fontWeight:600,color:valid?'#2d6a2d':'#c0392b',background:valid?'#eafaea':'#fde8e8',padding:'4px 10px',borderRadius:6}}>
                        {valid ? '✅ Soma conferida' : `⚠️ Soma ${somaParc.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})} ≠ Total ${totalNum.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}`}
                      </span>
                    )}
                  </div>
                  {(item.installments||[]).map((inst, i) => (
                    <div key={i} className="installment-row">
                      <span style={{fontSize:13,fontWeight:700,color:'var(--verde)',minWidth:28}}>#{i+1}</span>
                      <div><input value={inst.value} onChange={e=>updInstallment(itemIdx,i,'value',maskCurrency(e.target.value))} placeholder="R$ 0,00" inputMode="numeric" style={{width:130}} /></div>
                      <div><input type="date" value={inst.date} onChange={e=>updInstallment(itemIdx,i,'date',e.target.value)} /></div>
                      <div><input value={inst.note||''} onChange={e=>updInstallment(itemIdx,i,'note',e.target.value)} placeholder="Obs." /></div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* ---- ITENS USADOS (Trade-in) ---- */}
            {(() => {
              const tis = item.tradeIns || [];
              const tiTotal = tradeInTotal(item);
              const newVal = parseCurrency(item.totalValue);
              const net = netValue(item);
              return (
                <div style={{marginTop:16,borderTop:'2px dashed #c0392b',paddingTop:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <span style={{fontWeight:700,fontSize:13,color:'#c0392b'}}>🔄 Equipamentos Usados para Troca/Abatimento</span>
                    <button className="btn btn-sm" onClick={()=>addTradeIn(itemIdx)}
                      style={{background:'#c0392b',color:'white',border:'none',borderRadius:6,padding:'4px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>
                      + Adicionar Usado
                    </button>
                  </div>

                  {tis.length === 0 && (
                    <div style={{color:'#999',fontSize:12,fontStyle:'italic',padding:'8px 0'}}>
                      Nenhum equipamento usado informado. Clique em "+ Adicionar Usado" para incluir.
                    </div>
                  )}

                  {tis.map((ti, tiIdx) => {
                    const tiVal = parseCurrency(ti.value);
                    const tiParcTotal = tiParcelasTotal(ti);
                    const tiParcDiff = Math.abs(tiVal - tiParcTotal);
                    const tiParcOk = tiParcDiff < 0.02;
                    return (
                    <div key={ti._id||tiIdx} style={{background:'#fdf0f0',border:'1px solid #e8b4b4',borderRadius:8,padding:12,marginBottom:8}}>
                      {/* Linha principal: tipo / descrição / valor / remover */}
                      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-start'}}>
                        <div style={{flex:'0 0 150px'}}>
                          <label style={{fontSize:11,fontWeight:600,color:'#c0392b',display:'block',marginBottom:3}}>Tipo</label>
                          <select value={ti.type} onChange={e=>updTradeIn(itemIdx,tiIdx,'type',e.target.value)}
                            style={{width:'100%',padding:'6px 8px',border:'1px solid #e8b4b4',borderRadius:6,fontSize:13}}>
                            <option value="">Selecione...</option>
                            <option>Trator</option>
                            <option>Colheitadeira</option>
                            <option>Plataforma</option>
                            <option>Escavadeira</option>
                            <option>Carreta Graneleira</option>
                            <option>Pulverizador</option>
                            <option>Plantadeira</option>
                            <option>Outro Implemento</option>

          const grandBruto = form.items.reduce((s,i) => s + parseCurrency(i.totalValue), 0);
          const grandTradeIn = form.items.reduce((s,i) => s + tradeInTotal(i), 0);
          const grandLiquido = form.items.reduce((s,i) => s + netValue(i), 0);

            <div style={{background:'#1a1a1a',borderRadius:10,padding:16,marginTop:16,marginBottom:4}}>

                const ti = tradeInTotal(item);
                const nv = netValue(item);

                  <div key={i} style={{marginBottom:8,padding:'8px 10px',borderRadius:7,background:'rgba(255,255,255,0.06)'}}>

                      <span style={{color:'#ccc',fontSize:13}}>Item {i+1}{item.model ? `  -  ${item.model}` : ''}</span>

                        {(item.tradeIns||[]).map((t,ti2)=>{

              {form.items.length > 1 && (
                <div style={{borderTop:'1px solid #444',marginTop:6,paddingTop:10}}>

                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>

                        <span style={{color:'#e88080',fontWeight:600,fontSize:13}}>({fmtCurrency(grandTradeIn)})</span>
                      </div>
                    </>

                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                  </div>

              )}

        {/* Observações gerais */}
        <div className="section-title">Observações Gerais</div>
        <div className="form-group">
          <textarea value={form.notes} onChange={e=>upd('notes',e.target.value)} rows={3} placeholder="Observações adicionais sobre a proposta..." />
        </div>

        {/* Botões */}
        <div className="btn-group">
          <button className="btn btn-primary" onClick={()=>{
            let ok = true;
            for (const item of form.items) {
              if (item.paymentType === 'Parcelado' && (item.installments||[]).length > 0) {
                const totalNum = parseCurrency(item.totalValue);
                const somaParc = (item.installments||[]).reduce((s,inst)=>s+parseCurrency(inst.value),0);
                if (Math.abs(totalNum - somaParc) >= 0.02) {
                  const idx = form.items.indexOf(item);
                  alert(`❌ Item ${idx+1} (${item.model||'sem modelo'}): soma das parcelas (${somaParc.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}) difere do valor total (${totalNum.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}). Corrija antes de salvar.`);
                  ok = false; break;
                }
              }
            }
            // Validar distribuição dos usados
            if (ok) {
              for (const item of form.items) {
                for (const ti of (item.tradeIns||[])) {
                  if ((ti.tipoUso||'avista')==='parcelas' && (ti.parcelas||[]).length > 0) {
                    const tiV = parseCurrency(ti.value);
                    const tiP = (ti.parcelas||[]).reduce((s,p)=>s+parseCurrency(p.valor),0);
                    if (Math.abs(tiV - tiP) >= 0.02) {
                      const idx = form.items.indexOf(item);
                      alert(`❌ Item ${idx+1}  -  usado "${ti.description||ti.type||'Sem nome'}": soma das parcelas do usado (${tiP.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}) difere do valor do usado (${tiV.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}). Corrija antes de salvar.`);
                      ok = false; break;
                    }
                  }
                }
                if (!ok) break;
              }
            }
            if (ok) onSave(form);
          }}>
            💾 {isEdit?'Atualizar':'Salvar'} Proposta
          </button>
          <button className="btn btn-secondary" onClick={handleGeneratePDF} disabled={pdfLoading} style={{opacity:pdfLoading?0.7:1}}>
            {pdfLoading ? '⏳ Carregando imagens...' : '📄 Gerar PDF'}
          </button>
          {isEdit && <button className="btn btn-outline" onClick={onCancel}>Cancelar</button>}
        </div>
      </div>

      {showCatalog !== null && (
        <div className="modal-overlay" onClick={()=>setShowCatalog(null)}>
          <div className="modal" style={{maxWidth:740}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">📦 Catálogo de Produtos  -  Item {showCatalog+1}</div>
            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              <select value={brandFilter} onChange={e=>{setBrandFilter(e.target.value);setCatFilter('');}} style={{flex:'0 0 170px'}}>
                <option value="">🏭 Todas as marcas</option>
                {brands.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
              <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{flex:1,minWidth:180}}>
                <option value="">Todas as Categorias</option>
                {cats.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="catalog-grid" style={{maxHeight:'60vh',overflowY:'auto'}}>
              {filteredCat.map(item => (
                <div key={item.id||item.name} className="catalog-card" onClick={()=>selectProduct(item, showCatalog)}>
                  {item.img && <img src={item.img} alt={item.name} className="catalog-img" onError={e=>{e.target.style.display='none';}} />}
                  {!item.img && (
                    <div style={{height:80,background:'linear-gradient(135deg,#1a3a1a,#2d6a2d)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,borderRadius:'6px 6px 0 0'}}>
                      {item.brand==='Jan'?'🔴':'🟢'}
                    </div>
                  )}
                  <div className="catalog-info">
                    <div className="catalog-name">{item.name}</div>
                    <div className="catalog-cat">{item.cat}</div>
                    <div style={{fontSize:10,color:'#aaa',marginTop:2,fontWeight:600}}>{item.brand}</div>
                    {item.finame && <div style={{fontSize:10,color:'#888',marginTop:1}}>FINAME: {item.finame}</div>}
                  </div>
                </div>
              ))}
              {filteredCat.length === 0 && (
                <div style={{gridColumn:'1/-1',textAlign:'center',padding:30,color:'#999'}}>
                  Nenhum produto encontrado para os filtros selecionados.
                </div>
              )}
            </div>
            <div style={{fontSize:12,color:'#888',marginTop:8,textAlign:'right'}}>{filteredCat.length} produto(s) encontrado(s) de {ALL_CATALOG.length} no catálogo</div>
            <div className="btn-group"><button className="btn btn-outline" onClick={()=>setShowCatalog(null)}>Fechar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============ HISTORICO ============
function HistoricoTab({proposals, sellers, onEdit, onDelete, onStatusChange, onPDF, filterStatus, setFilterStatus, filterSearch, setFilterSearch}) {
  const getModels = (p) => (p.items||[]).map(i=>i.model).filter(Boolean).join(' + ') || p.model || '';
  const getTotalValue = (p) => {
    if (p.items && p.items.length > 0)
      return p.items.reduce((s,i)=>s+Math.max(0,parseCurrency(i.totalValue)-(i.tradeIns||[]).reduce((ss,t)=>ss+parseCurrency(t.value),0)),0);
    return parseCurrency(p.totalValue);
  };

  const filtered = proposals.filter(p => {
    const matchStatus = !filterStatus || p.status===filterStatus || (!p.status && filterStatus==='aguardando');
    const models = getModels(p);
    const matchSearch = !filterSearch || p.clientName?.toLowerCase().includes(filterSearch.toLowerCase()) ||
      models.toLowerCase().includes(filterSearch.toLowerCase()) || p.num?.toLowerCase().includes(filterSearch.toLowerCase());
    return matchStatus && matchSearch;
  });

  const getStatusInfo = (status) => STATUS_OPTIONS.find(s=>s.value===status) || STATUS_OPTIONS[0];

  return (
    <div>
      <div className="filter-bar">
        <input value={filterSearch} onChange={e=>setFilterSearch(e.target.value)} placeholder="🔍 Buscar cliente, modelo ou Nº..." />
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="">Todos os Status</option>
          {STATUS_OPTIONS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
        </select>
      </div>

      {filtered.length === 0 ? (
        <div className="card"><div className="empty"><div className="empty-icon">📋</div><div>Nenhuma proposta encontrada.</div></div></div>
      ) : filtered.map(p => {
        const si = getStatusInfo(p.status);
        const seller = sellers.find(s=>s.id===p.sellerId);
        return (
          <div key={p.id} className="proposal-item">
            <div className="proposal-main">
              <div className="proposal-num">{p.num} · {seller?.name?.split(' ')[0]||''} · {fmtDate(p.date)}</div>
              <div className="proposal-client">{p.clientName || 'Cliente não informado'}</div>
              <div className="proposal-product">{getModels(p) || 'GTS do Brasil'}</div>
              <div className="proposal-meta">
                <span className={`status ${si.color}`}>{si.label}</span>
                {getTotalValue(p) > 0 && <span style={{marginLeft:8,fontSize:11,fontWeight:700}}>{fmtCurrency(getTotalValue(p))}</span>}
                {(p.items||[]).length > 1 && <span style={{marginLeft:8,fontSize:11,color:'var(--verde)',fontWeight:600}}>{p.items.length} itens</span>}
              </div>
            </div>
            <div className="proposal-actions">
              <button className="btn btn-outline btn-sm" onClick={()=>onStatusChange(p)} title="Alterar Status">🔄</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>onPDF(p)} title="Gerar PDF">📄</button>
              <button className="btn btn-outline btn-sm" onClick={()=>onEdit(p)} title="Editar">✏️</button>
              <button className="btn btn-danger btn-sm" onClick={()=>onDelete(p.id)} title="Excluir">🗑️</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============ CATALOGO ============
function CatalogoTab() {
  const [catFilter, setCatFilter] = useState('');
  const [brandFilter, setBrandFilter] = useState('');
  const brands = [...new Set(ALL_CATALOG.map(i=>i.brand))];
  const cats = [...new Set(ALL_CATALOG.filter(i=>!brandFilter||i.brand===brandFilter).map(i=>i.cat))];
  const filtered = ALL_CATALOG.filter(item => {
    const matchBrand = !brandFilter || item.brand === brandFilter;
    const matchCat = !catFilter || item.cat === catFilter;
    return matchBrand && matchCat;
  });

  return (
    <div>
      {/* Brand tabs */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <button onClick={()=>{setBrandFilter('');setCatFilter('');}}
          className={`btn btn-sm ${!brandFilter?'btn-primary':'btn-outline'}`}>
          🌐 Todos ({ALL_CATALOG.length})
        </button>
        {brands.map(b => (
          <button key={b} onClick={()=>{setBrandFilter(b);setCatFilter('');}}
            className={`btn btn-sm ${brandFilter===b?'btn-primary':'btn-outline'}`}>
            {b === 'Jan' ? '🔴' : '🟢'} {b} ({ALL_CATALOG.filter(i=>i.brand===b).length})
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{marginBottom:12}}>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{width:'100%'}}>
          <option value="">Todas as Categorias  -  {filtered.length} produto(s)</option>
          {cats.map(c => <option key={c} value={c}>{c} ({ALL_CATALOG.filter(i=>i.cat===c&&(!brandFilter||i.brand===brandFilter)).length})</option>)}
        </select>
      </div>

      <div className="catalog-grid">
        {filtered.map(item => (
          <div key={item.id||item.name} className="catalog-item" style={{cursor:'default'}}>
            {item.img ? (
              <img src={item.img} alt={item.name} style={{width:'100%',height:110,objectFit:'cover',borderRadius:6,marginBottom:10,backgroundColor:'#eee'}}
                onError={e=>{e.target.style.display='none';}} />
            ) : (
              <div style={{width:'100%',height:110,background:item.brand==='Jan'?'linear-gradient(135deg,#3a1a1a,#8b2020)':'linear-gradient(135deg,#1a3a1a,#2d6a2d)',borderRadius:6,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>
                {item.brand==='Jan'?'🔴':'🟢'}
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
              <div className="catalog-cat">{item.cat}</div>
              <span style={{fontSize:10,fontWeight:700,color:item.brand==='Jan'?'#c0392b':'#2d6a2d',background:item.brand==='Jan'?'#fde8e8':'#eafaea',padding:'2px 6px',borderRadius:4}}>{item.brand}</span>
            </div>
            <div className="catalog-name" style={{fontSize:16}}>{item.name}</div>
            <div className="catalog-desc" style={{marginTop:4}}>{item.desc}</div>
            {(item.finame || item.ncm) && (
              <div style={{marginTop:8,padding:'6px 8px',background:'#f0f7f0',borderRadius:4}}>
                {item.finame && <div style={{fontSize:10,fontWeight:700,color:'#2d6a2d'}}>FINAME: {item.finame}</div>}
                {item.ncm && <div style={{fontSize:10,fontWeight:700,color:'#2d6a2d'}}>NCM: {item.ncm}</div>}
              </div>
            )}
          </div>
        ))}
        {filtered.length === 0 && (
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:40,color:'#999'}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            Nenhum produto encontrado.
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
