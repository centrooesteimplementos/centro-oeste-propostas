﻿<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Centro Oeste Implementos - Propostas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #2d6a2d;
  --verde2: #3d8b3d;
  --amarelo: #e8a020;
  --amarelo2: #f5b82e;
  --cinza: #1a1a1a;
  --cinza2: #2c2c2c;
  --cinza3: #3e3e3e;
  --bg: #f0f0eb;
  --bgcard: #ffffff;
  --border: #d4d4c8;
  --text: #1a1a1a;
  --text2: #555;
  --vermelho: #c0392b;
  --azul: #2471a3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; text-transform: uppercase; transition: background 0.3s, color 0.3s; }
body.dark {
  --bg: #0b160c;
  --bgcard: #101e11;
  --border: #1c3320;
  --text: #dff0df;
  --text2: #6fa870;
  --cinza: #060e07;
  --cinza2: #0e1a0f;
  --cinza3: #1a2e1c;
  --verde: #3d8b3d;
  --verde2: #52a852;
  --vermelho: #c0392b;
  --azul: #2471a3;
}
body.dark .card { background: var(--bgcard); border-color: var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.6); }
body.dark .kpi-card { background: var(--bgcard); border-color: var(--border); }
body.dark input, body.dark select, body.dark textarea { background: #0b160c !important; color: var(--text) !important; border-color: var(--border); }
body.dark .modal { background: #101e11; border: 1px solid var(--border); }
body.dark .modal-title { color: var(--verde2); }
body.dark .status-aguardando { background: #2a2000; color: #d4a017; }
body.dark .status-aceito { background: #082008; color: #52c452; }
body.dark .status-perdido { background: #280808; color: #e07070; }
body.dark .status-desistencia { background: #1a1f1a; color: #8a8a8a; }
body.dark .nav-seller { background: var(--cinza2); border-color: var(--cinza3); }
body.dark .user-row { border-bottom-color: var(--border); }
body.dark .btn-outline { border-color: var(--border); color: var(--text2); }
body.dark .btn-outline:hover { border-color: var(--verde); color: var(--verde); }
body.dark .tabs { background: var(--cinza2); border-bottom-color: var(--verde); }
body.dark .tab { color: var(--text2); }
body.dark .tab.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }
body.dark .tab:hover:not(.active) { color: var(--text); }
body.dark .login-screen { background: var(--cinza); }
body.dark .item-card { background: var(--bgcard); border-color: var(--border); }
.dark-toggle { background: none; border: 1.5px solid var(--cinza3); border-radius: 20px; padding: 5px 12px; color: var(--text2); font-size: 12px; font-family: 'Barlow', sans-serif; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s; letter-spacing: 0.3px; }
.dark-toggle:hover { border-color: var(--verde2); color: var(--verde2); background: rgba(61,139,61,0.1); }

/* NAV */
.nav { background: var(--cinza); color: white; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-logo { height: 36px; width: auto; }
.nav-title { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1.2; }
.nav-title span { display: block; font-weight: 300; font-size: 11px; color: #aaa; letter-spacing: 1px; }
.nav-seller { display: flex; align-items: center; gap: 8px; cursor: pointer; background: var(--cinza2); padding: 6px 10px; border-radius: 6px; border: 1px solid var(--cinza3); transition: all 0.2s; }
.nav-seller:hover { background: var(--verde); border-color: var(--verde2); }
.nav-seller-icon { width: 28px; height: 28px; background: var(--verde); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; }
.nav-seller-name { font-size: 13px; font-weight: 600; }

/* TABS */
.tabs { background: var(--cinza2); display: flex; overflow-x: auto; border-bottom: 3px solid var(--verde); scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 12px 20px; font-size: 13px; font-weight: 600; color: #aaa; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: all 0.2s; letter-spacing: 0.5px; }
.tab.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }
.tab:hover:not(.active) { color: white; }

/* MAIN */
.main { max-width: 900px; margin: 0 auto; padding: 16px; }

/* CARDS */
.card { background: var(--bgcard); border-radius: 10px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title::before { content: ''; width: 4px; height: 20px; background: var(--amarelo); border-radius: 2px; display: inline-block; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-grid.three { grid-template-columns: 1fr; } }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
input, select, textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 14px; font-family: 'Barlow', sans-serif; background: white; color: var(--text); transition: border-color 0.2s; text-transform: uppercase; }
input::placeholder, textarea::placeholder { text-transform: uppercase; }
input[type="password"] { text-transform: none; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--verde); }
textarea { resize: vertical; min-height: 80px; }

/* BUTTONS */
.btn { padding: 10px 20px; border-radius: 7px; border: none; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.3px; }
.btn-primary { background: var(--verde); color: white; }
.btn-primary:hover { background: var(--verde2); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(45,106,45,0.3); }
.btn-secondary { background: var(--amarelo); color: var(--cinza); }
.btn-secondary:hover { background: var(--amarelo2); }
.btn-danger { background: var(--vermelho); color: white; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--verde); color: var(--verde); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

/* STATUS BADGES */
.status { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.status-aguardando { background: #fff3cd; color: #856404; }
.status-aceito { background: #d1e7dd; color: #0f5132; }
.status-perdido { background: #f8d7da; color: #842029; }
.status-desistencia { background: #e2e3e5; color: #41464b; }

/* KPI CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: var(--bgcard); border-radius: 10px; padding: 16px; border: 1px solid var(--border); border-left: 4px solid var(--verde); }
.kpi-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.kpi-value { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.kpi-card.amarelo { border-left-color: var(--amarelo); }
.kpi-card.vermelho { border-left-color: var(--vermelho); }
.kpi-card.azul { border-left-color: var(--azul); }
.kpi-aceito { color: #0f5132; }
.kpi-perdido { color: #c0392b; }
.kpi-aguardando { color: #856404; }
.kpi-azul { color: var(--azul); }
.kpi-amarelo { color: var(--amarelo); }
body.dark .kpi-aceito { color: #52c452; }
body.dark .kpi-perdido { color: #e07070; }
body.dark .kpi-aguardando { color: #d4a017; }
body.dark .kpi-azul { color: #5b9fd4; }
body.dark .kpi-amarelo { color: var(--amarelo); }

/* PROPOSAL LIST */
.proposal-item { background: var(--bgcard); border-radius: 8px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: box-shadow 0.2s; }
.proposal-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.proposal-main { flex: 1; min-width: 0; }
.proposal-num { font-size: 11px; color: var(--text2); font-weight: 600; }
.proposal-client { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proposal-product { font-size: 13px; color: var(--text2); margin-top: 2px; }
.proposal-meta { font-size: 11px; color: #999; margin-top: 4px; }
.proposal-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

/* PRODUCT CATALOG */
.catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.catalog-item { border: 2px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; background: white; }
.catalog-item:hover, .catalog-item.selected { border-color: var(--verde); background: #f0f7f0; }
.catalog-item.selected { border-width: 2.5px; }
.catalog-cat { font-size: 10px; color: var(--amarelo); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.catalog-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.catalog-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }
.catalog-img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; margin-bottom: 8px; background: #eee; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 11px; }

/* PAYMENT */
.payment-type-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.payment-chip { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: white; }
.payment-chip.active { border-color: var(--verde); background: #e8f5e8; color: var(--verde); }
.installment-row { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 8px; align-items: center; margin-top: 8px; }

/* SELLER LOGIN */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cinza); padding: 20px; }
.login-card { background: var(--bgcard); border-radius: 16px; padding: 40px 36px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.5); border: 1px solid var(--border); }
.login-logo { max-width: 200px; max-height: 70px; width: auto; height: auto; object-fit: contain; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto; }
.login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
.login-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; letter-spacing: 0.5px; }
.seller-btn { width: 100%; padding: 14px; margin-bottom: 10px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
.seller-btn:hover { border-color: var(--verde); background: #e8f5e8; color: var(--verde); }
.seller-avatar { width: 38px; height: 38px; background: var(--verde); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 14px; flex-shrink: 0; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--bgcard); border-radius: 12px; max-width: 500px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 16px; text-transform: uppercase; color: var(--verde); }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 10px; display: flex; align-items: center; gap: 6px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* FILTER */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.filter-bar input { flex: 1; min-width: 180px; }
.filter-bar select { min-width: 140px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* CHART BAR */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; font-weight: 600; width: 120px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 20px; background: var(--border); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--verde); border-radius: 4px; transition: width 0.5s; }
.bar-val { font-size: 12px; font-weight: 700; width: 30px; text-align: right; }

/* BADGE NUM */
.badge { background: var(--vermelho); color: white; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; }

/* PHOTO AREA */
.photo-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
.photo-area:hover { border-color: var(--verde); }
.photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.photo-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }

@media print { .no-print { display: none !important; } }

/* SYNC STATUS */
.sync-btn { display:flex; align-items:center; gap:6px; background:var(--cinza2); border:1px solid var(--cinza3); border-radius:6px; padding:5px 10px; cursor:pointer; font-size:12px; color:#aaa; transition:all 0.2s; margin-right:8px; }
.sync-btn:hover { border-color:var(--verde); color:white; }
.sync-btn.ok { border-color:#27ae60; color:#27ae60; }
.sync-btn.error { border-color:#e74c3c; color:#e74c3c; }
.sync-btn.syncing { border-color:var(--amarelo); color:var(--amarelo); }
.sync-spin { display:inline-block; animation:spin 1s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* GH CONFIG MODAL */
.gh-modal { max-width:420px; }
.gh-field { margin-bottom:14px; }
.gh-field label { display:block; font-size:12px; font-weight:600; color:#555; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.gh-field input { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; }
.gh-field input:focus { outline:none; border-color:var(--verde); }
.gh-help { font-size:11px; color:#888; margin-top:3px; }
.gh-divider { border:none; border-top:1px solid var(--border); margin:16px 0; }
/* FIREBASE AUTH */
.login-email-form { text-align:left; margin-top:20px; }
.login-error { color:#e74c3c; font-size:13px; margin-bottom:12px; text-align:center; padding:8px; background:#fdf3f3; border-radius:6px; }
.role-badge { display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px; }
.role-admin { background:#f0e6ff; color:#7b2d8b; }
.role-diretoria { background:#dce9f7; color:#1a5e8a; }
.role-vendedor { background:#dff0df; color:#2d6a2d; }
.user-row { display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border); }
.user-row:last-child { border-bottom:none; }
.user-avatar-sm { width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;flex-shrink:0; }
.user-avatar-admin { background:#7b2d8b; }
.user-avatar-diretoria { background:#1a5e8a; }
.user-avatar-vendedor { background:#2d6a2d; }
.user-inactive { opacity:0.45; }
</style>
</head>

<div id="root"></div>
<script type="text/babel">

// ============ MASCARAS ============
const maskCPF = (v) => {
  const d = (v||'').replace(/\D/g,'').slice(0,11);
  return d.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
};
const maskCNPJ = (v) => {
  const d = (v||'').replace(/\D/g,'').slice(0,14);
  return d
    .replace(/(\d{2})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d)/,'$1/$2')
    .replace(/(\d{4})(\d{1,2})$/,'$1-$2');
};
const maskDoc = (v, tipo) => tipo === 'cnpj' ? maskCNPJ(v) : maskCPF(v);
const maskPhone = (v) => {
  const d = (v||'').replace(/\D/g,'').slice(0,11);
  if (d.length <= 10) return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2');
  return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
};
const parseCurrency = (v) => {
  const clean = String(v||'').replace(/[R$\s.]/g,'').replace(',','.');
  return parseFloat(clean) || 0;
};
const maskCurrency = (v) => {
  const digits = String(v||'').replace(/\D/g,'');
  if (!digits) return '';
  const n = parseInt(digits, 10) / 100;
  return n.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
};

// ============ IMAGE FETCH HELPER ============
const fetchImageAsBase64 = async (url) => {
  if (!url) return null;
  // Already a base64 data URL (user gallery photos)
  if (url.startsWith('data:')) return url;

  // Build proxy URL: images.weserv.nl adds CORS headers to any image
  const stripProtocol = url.replace(/^https?:\/\//, '');
  const proxyUrl = `https://images.weserv.nl/?url=${encodeURIComponent(stripProtocol)}&output=jpg&q=85`;

  try {
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error('proxy failed');
    const blob = await resp.blob();
    return await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result);
      reader.onerror = rej;
      reader.readAsDataURL(blob);
    });
  } catch(e) {
    console.warn('Image fetch failed:', url, e);
    return null;
  }
};

// ============ PDF GENERATOR ============
const generatePDF = async (proposal, seller, logoB64) => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, marginL = 14, marginR = 196;
  const PAGE_H = 297, FOOTER_H = 18, SAFE_BOTTOM = PAGE_H - FOOTER_H - 8;

  // Normalize: suporte a proposta antiga (sem items) e nova (com items)
  const items = proposal.items && proposal.items.length > 0
    ? proposal.items
    : [{
        product: proposal.product, brand: proposal.brand, model: proposal.model,
        finame: proposal.finame, ncm: proposal.ncm, description: proposal.description,
        productImg: proposal.productImg, photos: proposal.photos || [],
        totalValue: proposal.totalValue, paymentType: proposal.paymentType,
        installments: proposal.installments || [], deliveryTime: proposal.deliveryTime,
      }];

  // Pre-carregar todas as imagens
  const itemImages = [];
  for (const item of items) {
    const prod = await fetchImageAsBase64(item.productImg || '');
    const photos = [];
    for (const ph of (item.photos || [])) {
      const d = await fetchImageAsBase64(ph);
      if (d) photos.push(d);
    }
    itemImages.push({ prod, photos });
  }

  // ---- HELPERS ----
  const drawFooter = () => {
    const total = doc.internal.getNumberOfPages();
    for (let p = 1; p <= total; p++) {
      doc.setPage(p);
      doc.setFillColor(26,26,26);
      doc.rect(0, PAGE_H - FOOTER_H, W, FOOTER_H, 'F');
      doc.setTextColor(180,180,180);
      doc.setFontSize(7);
      doc.setFont('helvetica','normal');
      doc.text('Centro Oeste Implementos | Esta proposta tem caráter comercial e está sujeita a alterações sem aviso prévio.', W/2, PAGE_H - FOOTER_H + 6, { align:'center' });
      doc.setTextColor(232,160,32);
      doc.text(`Proposta: ${proposal.num} | Vendedor: ${seller?.name||''} | Pág. ${p}/${total}`, W/2, PAGE_H - FOOTER_H + 11, { align:'center' });
    }
  };

  const newPage = () => {
    doc.addPage();
    doc.setFillColor(45,106,45);
    doc.rect(0, 0, W, 8, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.text(`PROPOSTA ${proposal.num}  -  ${proposal.clientName||''}  (continuação)`, W/2, 5.5, { align:'center' });
    return 14;
  };

  const checkBreak = (y, needed) => {
    if (y + needed > SAFE_BOTTOM) return newPage();
    return y;
  };

  const sectionHeader = (y, label, color=[240,240,235], textColor=[45,106,45]) => {
    y = checkBreak(y, 14);
    doc.setFillColor(...color);
    doc.rect(marginL, y, 182, 6, 'F');
    doc.setTextColor(...textColor);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.text(label, marginL+2, y+4.5);
    return y + 8;
  };

  // ---- CABEÇALHO (primeira página) ----
  let y = 14;
  doc.setFillColor(26,26,26);
  doc.rect(0, 0, W, 42, 'F');
  if (logoB64) {
    try { doc.addImage('data:image/png;base64,' + logoB64, 'PNG', marginL, 6, 50, 28); } catch(e) {}
  }
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.text('CENTRO OESTE IMPLEMENTOS AGRICOLAS LTDA', marginR, 10, { align:'right' });
  doc.setFont('helvetica','normal');
  doc.setFontSize(6.5);
  doc.text('CNPJ: 39.834.512/0001-99', marginR, 15, { align:'right' });
  doc.text('Av. Vitória Régia, 543 W, Sala 03 - Bandeirantes', marginR, 20, { align:'right' });
  doc.text('Lucas do Rio Verde - MT  |  CEP: 78.455-000', marginR, 25, { align:'right' });
  doc.text('(65) 9633-3114 / (65) 9949-4755', marginR, 30, { align:'right' });
  doc.text('financeiro@centroosteimplementos.com.br', marginR, 35, { align:'right' });
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.text(`Vendedor: ${seller?.name || ''}`, marginR, 40, { align:'right' });
  doc.setFillColor(45,106,45);
  doc.rect(0, 42, W, 12, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.text('PROPOSTA COMERCIAL', W/2, 50, { align:'center' });
  doc.setFillColor(232,160,32);
  doc.rect(marginL, 57, 85, 7, 'F');
  doc.rect(105, 57, 85, 7, 'F');
  doc.setTextColor(26,26,26);
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  doc.text(`Nº ${proposal.num}`, marginL+2, 62);
  doc.text(`Data: ${fmtDate(proposal.date)}`, 107, 62);
  y = 70;

  // ---- DADOS DO CLIENTE ----
  y = sectionHeader(y, 'DADOS DO CLIENTE');
  doc.setTextColor(26,26,26);
  doc.setFontSize(9);
  const clientRows = [
    [`Cliente: ${(proposal.clientName||'').toUpperCase()}`, `${(proposal.docTipo==='cnpj'?'CNPJ':'CPF')}: ${proposal.cpf||''}`],
    [`Telefone: ${(proposal.phone||'').toUpperCase()}`, `Fazenda: ${(proposal.farm||'').toUpperCase()}`],
    [`Cidade: ${(proposal.city||'').toUpperCase()}${proposal.estado?' - '+proposal.estado.toUpperCase():''}`, `Validade: ${fmtDate(proposal.validUntil)||'A definir'}`],
  ];
  clientRows.forEach(row => {
    doc.setFont('helvetica','bold');
    doc.text(row[0], marginL, y+4);
    if (row[1]) doc.text(row[1], 105, y+4);
    y += 6;
  });
  y += 4;

  // ---- LOOP DE ITENS ----
  for (let idx = 0; idx < items.length; idx++) {
    const item = items[idx];
    const imgs = itemImages[idx];

    if (items.length > 1) {
      y = checkBreak(y, 10);
      doc.setFillColor(45,106,45);
      doc.rect(marginL, y, 182, 7, 'F');
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.text(`ITEM ${idx+1}${item.model ? '  -  ' + item.model : ''}`, marginL+3, y+5);
      y += 10;
    }

    y = sectionHeader(y, 'DADOS DO PRODUTO');
    doc.setTextColor(26,26,26);
    const prodRows = [
      [`Marca: ${item.brand||'GTS do Brasil'}`, `Modelo: ${item.model||''}`],
      [`Cód. FINAME: ${item.finame||''}`, `NCM: ${item.ncm||''}`],
      [`Produto: ${item.product||''}`, `Prazo de Entrega: ${item.deliveryTime||'A definir'}`],
    ];
    prodRows.forEach(row => {
      y = checkBreak(y, 8);
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.text(row[0], marginL, y+4);
      if (row[1]) doc.text(row[1], 105, y+4);
      y += 6;
    });
    y += 2;

    if (item.description) {
      doc.setFont('helvetica','normal');
      doc.setFontSize(8.5);
      if (imgs.prod) {
        const imgW = 62, imgH = 46;
        const textW = 182 - imgW - 4;
        const descLines = doc.splitTextToSize(item.description, textW);
        const blockH = Math.max(imgH, descLines.length * 5);
        // checkBreak ANTES do header para manter titulo e texto na mesma pagina
        y = checkBreak(y, blockH + 18);
        y = sectionHeader(y, 'DESCRICAO DO PRODUTO');
        doc.setTextColor(26,26,26);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8.5);
        try { doc.addImage(imgs.prod, 'JPEG', marginL + textW + 4, y, imgW, imgH); } catch(e){}
        doc.text(descLines, marginL, y+4);
        y += blockH + 4;
      } else {
        const descLines = doc.splitTextToSize(item.description, 178);
        // checkBreak ANTES do header: 14 (header) + altura do texto
        y = checkBreak(y, descLines.length * 5 + 20);
        y = sectionHeader(y, 'DESCRICAO DO PRODUTO');
        doc.setTextColor(26,26,26);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8.5);
        doc.text(descLines, marginL, y+4);
        y += descLines.length * 5 + 4;
      }
    }

    if (imgs.photos.length > 0) {
      const cols = Math.min(imgs.photos.length, 3);
      const spacing = 3;
      const photoW = (182 - spacing*(cols-1)) / cols;
      const photoH = photoW * 0.62;
      // checkBreak ANTES do header
      y = checkBreak(y, photoH + 18);
      y = sectionHeader(y, 'FOTOS DO EQUIPAMENTO');
      for (let c = 0; c < cols; c++) {
        try { doc.addImage(imgs.photos[c], 'JPEG', marginL + c*(photoW+spacing), y, photoW, photoH); } catch(e){}
      }
      y += photoH + 3;
      if (imgs.photos.length > 3) {
        const cols2 = Math.min(imgs.photos.length - 3, 3);
        y = checkBreak(y, photoH + 4);
        for (let c = 0; c < cols2; c++) {
          try { doc.addImage(imgs.photos[3+c], 'JPEG', marginL + c*(photoW+spacing), y, photoW, photoH); } catch(e){}
        }
        y += photoH + 3;
      }
    }

    // Valor bruto do item
    const itemBruto = parseCurrency(item.totalValue);
    const itemTIs = item.tradeIns || [];
    const itemTiTotal = itemTIs.reduce((s,t)=>s+parseCurrency(t.value),0);
    const itemNet = Math.max(0, itemBruto - itemTiTotal);
    const hasItemTI = itemTIs.length > 0 && itemTiTotal > 0;

    y = checkBreak(y, 14);
    doc.setFillColor(45, 82, 45);
    doc.rect(marginL, y, 182, 10, 'F');
    doc.setTextColor(232,160,32);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    const itemLabel = items.length > 1 ? `VALOR DO ITEM ${idx+1}:` : 'VALOR DO EQUIPAMENTO NOVO:';
    doc.text(itemLabel, marginL+4, y+7);
    doc.text(fmtCurrency(item.totalValue), marginR, y+7, { align:'right' });
    y += 14;

    // Tabela de trade-ins se houver
    if (hasItemTI) {
      y = sectionHeader(y, 'EQUIPAMENTOS USADOS  -  ABATIMENTO NO VALOR', [253,235,235], [180,40,40]);
      itemTIs.forEach((ti, tii) => {
        y = checkBreak(y, 8);
        const even = tii % 2 === 0;
        if (even) { doc.setFillColor(255,248,248); doc.rect(marginL, y, 182, 7, 'F'); }
        doc.setFont('helvetica','normal'); doc.setFontSize(9);
        doc.setTextColor(120,40,40);
        const tiDesc = `${ti.type||'Usado'}${ti.description ? '  -  '+ti.description : ''}`;
        const tiModo = (ti.tipoUso||'avista')==='parcelas' ? ' (parcelado)' : ' (à vista)';
        doc.text(`(${tii+1}) ${tiDesc}${tiModo}`, marginL+2, y+5);
        doc.setFont('helvetica','bold');
        doc.setTextColor(180,40,40);
        doc.text(`(${fmtCurrency(ti.value)})`, marginR, y+5, {align:'right'});
        y += 7;

        // Sub-linhas de distribuição do usado (se parcelado)
        if ((ti.tipoUso||'avista')==='parcelas' && (ti.parcelas||[]).length > 0) {
          ti.parcelas.forEach((parc, pIdx) => {
            y = checkBreak(y, 6);
            doc.setFillColor(255,244,244);
            doc.rect(marginL+4, y, 178, 6, 'F');
            doc.setFont('helvetica','normal'); doc.setFontSize(8);
            doc.setTextColor(150,50,50);
            const parcObs = parc.obs ? `  -  ${parc.obs}` : '';
            doc.text(`   ${pIdx+1}ª parcela do usado${parcObs}`, marginL+6, y+4);
            doc.setFont('helvetica','bold');
            doc.text(`(${fmtCurrency(parc.valor)})`, marginR, y+4, {align:'right'});
            y += 6;
          });
        }
      });

      // Linha total trade-in
      y = checkBreak(y, 7);
      doc.setFillColor(240,220,220);
      doc.rect(marginL, y, 182, 7, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.setTextColor(140,30,30);
      doc.text('Total de Abatimento (Usados):', marginL+2, y+5);
      doc.text(`(${fmtCurrency(itemTiTotal)})`, marginR, y+5, {align:'right'});
      y += 10;

      // Valor líquido destacado
      y = checkBreak(y, 12);
      doc.setFillColor(30,80,30);
      doc.rect(marginL, y, 182, 12, 'F');
      doc.setTextColor(144,238,144);
      doc.setFont('helvetica','bold'); doc.setFontSize(12);
      const netLabel = items.length > 1 ? `VALOR LÍQUIDO ITEM ${idx+1}:` : 'VALOR LÍQUIDO A PAGAR:';
      doc.text(netLabel, marginL+4, y+8.5);
      doc.setTextColor(255,255,255);
      doc.text(fmtCurrency(itemNet), marginR, y+8.5, {align:'right'});
      y += 16;
    }

    y = checkBreak(y, 30);
    y = sectionHeader(y, 'CONDICAO DE PAGAMENTO');
    doc.setTextColor(26,26,26);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.text(`Forma de Pagamento: ${item.paymentType||''}`, marginL, y+4);
    y += 7;

    if (item.paymentType === 'Parcelado' && item.installments?.length) {
      // Montar tabela de parcelas com desconto de usados parcelados incluído
      const tiParcelados = itemTIs.filter(ti=>(ti.tipoUso||'avista')==='parcelas' && (ti.parcelas||[]).length > 0);
      const rows = item.installments.map((inst, i) => {
        const descUsado = tiParcelados.reduce((s,ti)=>{
          const tiParc = (ti.parcelas||[])[i];
          return s + (tiParc ? parseCurrency(tiParc.valor) : 0);
        }, 0);
        const bruto = parseCurrency(inst.value);
        const liquido = Math.max(0, bruto - descUsado);
        const descontoStr = descUsado > 0 ? `(-${fmtCurrency(descUsado)})` : '';
        return [
          `${i+1}ª`,
          fmtCurrency(bruto),
          descontoStr,
          fmtCurrency(liquido),
          fmtDate(inst.date),
          inst.note||''
        ];
      });
      const hasDescontos = tiParcelados.length > 0;
      y = checkBreak(y, Math.min(rows.length * 8 + 16, 60));
      doc.autoTable({
        startY: y,
        head: [hasDescontos
          ? ['Parc.','Valor Bruto','Desc. Usado','Valor Líquido','Vencimento','Obs']
          : ['Parcela','Valor','Vencimento','Obs']
        ],
        body: hasDescontos ? rows : rows.map(r=>[`Parcela ${r[0].replace('ª','')}`,r[1],r[4],r[5]]),
        margin: { left: marginL, right: 14 },
        headStyles: { fillColor:[45,106,45], textColor:255, fontStyle:'bold', fontSize:8 },
        bodyStyles: { fontSize:8 },
        alternateRowStyles: { fillColor:[248,248,244] },
        columnStyles: hasDescontos ? {2:{textColor:[180,40,40],fontStyle:'bold'}, 3:{fontStyle:'bold'}} : {},
      });
      y = doc.lastAutoTable.finalY + 6;
    } else {
      y += 2;
    }

    // Bloco de usados à vista (se houver) para mostrar como crédito disponível
    const tiAVista = itemTIs.filter(ti=>(ti.tipoUso||'avista')==='avista');
    const tiParceladoSemInst = itemTIs.filter(ti=>(ti.tipoUso||'avista')==='parcelas' && item.paymentType!=='Parcelado' && (ti.parcelas||[]).length > 0);
    if (tiParceladoSemInst.length > 0) {
      y = checkBreak(y, 10);
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(140,30,30);
      doc.text('Distribuição do(s) usado(s) no pagamento:', marginL, y+4);
      y += 7;
      tiParceladoSemInst.forEach(ti => {
        (ti.parcelas||[]).forEach((parc, pIdx) => {
          y = checkBreak(y, 6);
          doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(120,40,40);
          const obs = parc.obs ? `  -  ${parc.obs}` : '';
          doc.text(`  Entrada ${pIdx+1} do usado "${ti.description||ti.type||'Usado'}"${obs}:`, marginL+2, y+4);
          doc.setFont('helvetica','bold'); doc.setTextColor(180,40,40);
          doc.text(`(${fmtCurrency(parc.valor)})`, marginR, y+4, {align:'right'});
          y += 6;
        });
      });
    }
    y += 4;
  }

  // ---- RESUMO TOTAL GERAL (quando há mais de 1 item) ----
  if (items.length > 1) {
    const grandBruto = items.reduce((s,item)=>s+parseCurrency(item.totalValue),0);
    const grandTI = items.reduce((s,item)=>s+(item.tradeIns||[]).reduce((ss,t)=>ss+parseCurrency(t.value),0),0);
    const grandLiquido = Math.max(0, grandBruto - grandTI);
    const hasAnyTI = grandTI > 0;
    const rowsNeeded = items.length * 7 + (hasAnyTI ? 28 : 14) + 20;
    y = checkBreak(y, rowsNeeded);

    y = sectionHeader(y, 'RESUMO DA PROPOSTA', [232,160,32], [26,26,26]);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(26,26,26);

    items.forEach((item, i) => {
      const iTiTotal = (item.tradeIns||[]).reduce((s,t)=>s+parseCurrency(t.value),0);
      const iNet = Math.max(0, parseCurrency(item.totalValue) - iTiTotal);
      y = checkBreak(y, 8);
      const even = i % 2 === 0;
      if (even) { doc.setFillColor(248,248,244); doc.rect(marginL, y, 182, 7, 'F'); }
      doc.setFont('helvetica','normal'); doc.setFontSize(9);
      doc.setTextColor(80,80,80);
      doc.text(`Item ${i+1}${item.model?'  -  '+item.model:''}`, marginL+2, y+5);
      if (iTiTotal > 0) {
        doc.setFont('helvetica','bold'); doc.setTextColor(100,100,100);
        doc.text(fmtCurrency(item.totalValue), marginR-45, y+5, {align:'right'});
        doc.setTextColor(180,40,40);
        doc.text(`(${fmtCurrency(iTiTotal)})`, marginR-2, y+5, {align:'right'});
      } else {
        doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
        doc.text(fmtCurrency(item.totalValue), marginR, y+5, {align:'right'});
      }
      y += 7;
    });

    doc.setDrawColor(200,200,200); doc.line(marginL, y, marginR, y); y += 3;

    if (hasAnyTI) {
      // Subtotal bruto
      y = checkBreak(y, 8);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
      doc.text('Subtotal Bruto:', marginL+2, y+5);
      doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
      doc.text(fmtCurrency(grandBruto), marginR, y+5, {align:'right'}); y += 7;

      // Total abatimento
      y = checkBreak(y, 8);
      doc.setFillColor(255,245,245); doc.rect(marginL, y, 182, 7, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(140,30,30);
      doc.text('(-) Total Abatimento (Usados):', marginL+2, y+5);
      doc.text(`(${fmtCurrency(grandTI)})`, marginR, y+5, {align:'right'}); y += 10;

      doc.setDrawColor(180,180,180); doc.line(marginL, y, marginR, y); y += 3;
    }

    // Total final
    y = checkBreak(y, 14);
    doc.setFillColor(26,26,26); doc.rect(marginL, y, 182, 14, 'F');
    doc.setTextColor(232,160,32); doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.text(hasAnyTI ? 'TOTAL LÍQUIDO GERAL DA PROPOSTA:' : 'TOTAL GERAL DA PROPOSTA:', marginL+4, y+9.5);
    doc.setTextColor(255,255,255);
    doc.text(fmtCurrency(grandLiquido), marginR, y+9.5, {align:'right'});
    y += 18;
  }
  if (proposal.notes && proposal.notes.trim()) {
    y = sectionHeader(y, 'OBSERVAÇÕES');
    doc.setTextColor(26,26,26);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    const noteLines = doc.splitTextToSize(proposal.notes.trim().toUpperCase(), 178);
    const noteH = noteLines.length * 5 + 4;
    y = checkBreak(y, noteH);
    doc.text(noteLines, marginL, y+4);
    y += noteH + 4;
  }

  // ---- ASSINATURAS ----
  y = checkBreak(y, 30);
  y += 6;
  doc.setDrawColor(180,180,180);
  doc.line(marginL, y, 90, y);
  doc.line(105, y, marginR, y);
  doc.setTextColor(120,120,120);
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.text('Assinatura do Vendedor', marginL, y+5);
  doc.text('Assinatura do Cliente', 105, y+5);
  doc.text(seller?.name || '', marginL, y+10);
  y += 18;
  doc.setDrawColor(200,200,200);
  doc.line(marginL, y, marginR, y);
  y += 4;
  doc.setTextColor(26,26,26);
  doc.setFont('helvetica','bold');
  doc.setFontSize(7.5);
  doc.text('CENTRO OESTE IMPLEMENTOS AGRICOLAS LTDA', marginL, y);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.text('CNPJ: 39.834.512/0001-99', marginL, y+5);
  doc.text('Av. Vitória Régia, 543 W, Sala 03 - Bandeirantes  |  Lucas do Rio Verde - MT  |  CEP: 78.455-000', marginL, y+10);
  doc.text('Tel: (65) 9633-3114 / (65) 9949-4755  |  financeiro@centroosteimplementos.com.br', marginL, y+15);

  // ---- RODAPÉ EM TODAS AS PÁGINAS ----
  drawFooter();

  doc.save(`Proposta_${proposal.num}_${(proposal.clientName||'cliente').replace(/\s/g,'_')}.pdf`);
};

// ============ MAIN APP ============
function App() {
  const [authLoading, setAuthLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(null);
  const [userProfile, setUserProfile] = useState(null);
  const [proposals, setProposals] = useState([]);
  const [users, setUsers] = useState([]);
  const [tab, setTab] = useState('dashboard');
  const [editProposal, setEditProposal] = useState(null);
  const [filterStatus, setFilterStatus] = useState('');
  const [filterSearch, setFilterSearch] = useState('');
  const [showStatusModal, setShowStatusModal] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('darkMode') === '1');
  const [showChangePwd, setShowChangePwd] = useState(false);
  const [forcePwdNotice, setForcePwdNotice] = useState('');
  const unsubProposals = useRef(null);
  const unsubUsers = useRef(null);

  useEffect(() => {
    if (darkMode) { document.body.classList.add('dark'); localStorage.setItem('darkMode','1'); }
    else { document.body.classList.remove('dark'); localStorage.setItem('darkMode','0'); }
  }, [darkMode]);

  const logoB64 = darkMode ? LOGO_BRANCA_B64 : LOGO_PRETA_B64;

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          const doc = await db.collection('users').doc(user.uid).get();
          if (doc.exists && doc.data().active !== false) {
            const data = doc.data();
            if (data.forcePassword) {
              try {
                await user.updatePassword(data.forcePassword);
                await db.collection('users').doc(user.uid).update({ forcePassword: firebase.firestore.FieldValue.delete() });
                setForcePwdNotice('Sua senha foi redefinida pelo administrador. Troque-a agora se desejar.');
                setShowChangePwd(true);
              } catch(e) { console.error('forcePassword apply error', e); }
            }
            setCurrentUser(user);
            setUserProfile({ id: user.uid, ...data });
          } else {
            await auth.signOut();
            setCurrentUser(null); setUserProfile(null);
          }
        } catch(e) { console.error(e); setCurrentUser(null); setUserProfile(null); }
      } else {
        setCurrentUser(null); setUserProfile(null);
        if (unsubProposals.current) { unsubProposals.current(); unsubProposals.current = null; }
        if (unsubUsers.current) { unsubUsers.current(); unsubUsers.current = null; }
        setProposals([]); setUsers([]);
      }
      setAuthLoading(false);
    });
    return () => unsub();
  }, []);

  useEffect(() => {
    if (!userProfile) return;
    unsubUsers.current = db.collection('users').onSnapshot(snap => {
      setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    const q = userProfile.role === 'vendedor'
      ? db.collection('proposals').where('sellerId', '==', userProfile.id)
      : db.collection('proposals');
    unsubProposals.current = q.orderBy('date', 'desc').onSnapshot(
      snap => { setProposals(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setSyncStatus('ok'); },
      err => { console.error(err); setSyncStatus('error'); }
    );
    return () => {
      if (unsubProposals.current) { unsubProposals.current(); unsubProposals.current = null; }
      if (unsubUsers.current) { unsubUsers.current(); unsubUsers.current = null; }
    };
  }, [userProfile]);

  const saveProposal = async (p) => {
    setSyncStatus('syncing');
    try {
      const { id, ...data } = p;
      await db.collection('proposals').doc(id).set(data);
      setSyncStatus('ok'); setEditProposal(null); setTab('historico');
    } catch(e) { console.error(e); setSyncStatus('error'); }
  };

  const deleteProposal = async (id) => {
    if (confirm('Excluir esta proposta?')) await db.collection('proposals').doc(id).delete();
  };

  const updateStatus = async (id, status) => {
    await db.collection('proposals').doc(id).update({ status });
    setShowStatusModal(null);
  };

  if (authLoading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--cinza)',color:'white',flexDirection:'column',gap:12}}>
      <div style={{fontSize:36}}>&#x21BB;</div><div>Carregando...</div>
    </div>
  );

  if (!currentUser || !userProfile) return <LoginScreen logoB64={logoB64} darkMode={darkMode} setDarkMode={setDarkMode} />;

  const role = userProfile.role;
  const sellers = users.filter(u => u.active !== false);
  const syncIcon = syncStatus==='syncing' ? '↻' : syncStatus==='ok' ? '✓' : syncStatus==='error' ? '✕' : '☁';

  return (
    <div>
      <nav className="nav no-print">
        <div className="nav-brand">
          {logoB64 ? <img src={`data:image/png;base64,${logoB64}`} alt="Logo" className="nav-logo" /> : null}
          <div className="nav-title">Centro Oeste<span>Implementos</span></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div className={`sync-btn ${syncStatus}`}>
            {syncIcon} <span style={{maxWidth:70,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>
              {syncStatus==='syncing'?'Salvando...':syncStatus==='error'?'Erro':'Firebase'}
            </span>
          </div>
          <button className="dark-toggle" onClick={()=>setDarkMode(d=>!d)} title="Alternar modo escuro/claro">
            {darkMode ? '☀️ Claro' : '🌙 Escuro'}
          </button>
          <span className={`role-badge role-${role}`}>{ROLE_LABELS[role]}</span>
          <button className="btn btn-sm btn-outline" style={{fontSize:11,padding:'4px 8px'}} onClick={()=>{ setForcePwdNotice(''); setShowChangePwd(true); }} title="Trocar senha">🔑 Senha</button>
          <div className="nav-seller" onClick={()=>auth.signOut()} title="Clique para sair">
            <div className={`nav-seller-icon user-avatar-${role}`}>{userProfile.initials}</div>
            <div className="nav-seller-name">{userProfile.name.split(' ')[0]}</div>
          </div>
        </div>
      </nav>
      <div className="tabs no-print">
        {[
          {id:'dashboard',label:'📊 Dashboard'},
          {id:'nova',label:'➕ Nova Proposta'},
          {id:'historico',label:'📋 Histórico'},
          {id:'catalogo',label:'📦 Catálogo GTS + Jan'},
          ...(role==='admin'?[{id:'admin',label:'👥 Usuários'}]:[]),
        ].map(t => (
          <div key={t.id} className={`tab ${tab===t.id?'active':''}`}
            onClick={()=>{setTab(t.id); if(t.id==='nova')setEditProposal(null);}}>
            {t.label}
          </div>
        ))}
      </div>
      <div className="main">
        {tab==='dashboard' && <Dashboard proposals={proposals} sellers={sellers} />}
        {tab==='nova' && <ProposalForm proposal={editProposal} sellers={sellers} currentSeller={userProfile}
          userRole={role} proposals={proposals} onSave={saveProposal} onCancel={()=>setTab('historico')} logoB64={logoB64} />}
        {tab==='historico' && <HistoricoTab proposals={proposals} sellers={sellers}
          onEdit={p=>{setEditProposal(p);setTab('nova');}} onDelete={deleteProposal}
          onStatusChange={p=>setShowStatusModal(p)}
          onPDF={p=>{ const s=users.find(x=>x.id===p.sellerId)||userProfile; generatePDF(p,s,LOGO_PDF_B64); }}
          filterStatus={filterStatus} setFilterStatus={setFilterStatus}
          filterSearch={filterSearch} setFilterSearch={setFilterSearch} />}
        {tab==='catalogo' && <CatalogoTab />}
        {tab==='admin' && role==='admin' && <AdminPanel currentUserId={currentUser.uid} />}
      </div>
      {showChangePwd && <ChangePwdModal notice={forcePwdNotice} onClose={()=>setShowChangePwd(false)} />}
      {showStatusModal && (
        <div className="modal-overlay" onClick={()=>setShowStatusModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Alterar Status</div>
            <p style={{fontSize:13,color:'#555',marginBottom:16}}>Proposta: <b>{showStatusModal.num}</b> &mdash; {showStatusModal.clientName}</p>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {STATUS_OPTIONS.map(s => (
                <button key={s.value} className={`btn ${showStatusModal.status===s.value?'btn-primary':'btn-outline'}`}
                  onClick={()=>updateStatus(showStatusModal.id, s.value)}>{s.label}</button>
              ))}
            </div>
            <div className="btn-group"><button className="btn btn-outline" onClick={()=>setShowStatusModal(null)}>Cancelar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}
// ============ TROCAR SENHA ============
function ChangePwdModal({ notice, onClose }) {
  const [newPwd, setNewPwd] = useState('');
  const [confirmPwd, setConfirmPwd] = useState('');
  const [currentPwd, setCurrentPwd] = useState('');
  const [needReauth, setNeedReauth] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (newPwd !== confirmPwd) { setError('As senhas não coincidem.'); return; }
    if (newPwd.length < 6) { setError('A senha deve ter ao menos 6 caracteres.'); return; }
    setLoading(true); setError('');
    try {
      if (needReauth) {
        const user = auth.currentUser;
        const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPwd);
        await user.reauthenticateWithCredential(cred);
      }
      await auth.currentUser.updatePassword(newPwd);
      setSuccess(true);
    } catch(err) {
      if (err.code === 'auth/requires-recent-login') {
        setNeedReauth(true);
        setError('Sessão expirada. Digite sua senha atual para confirmar.');
      } else if (err.code === 'auth/wrong-password') {
        setError('Senha atual incorreta.');
      } else {
        setError('Erro: ' + (err.message || 'tente novamente.'));
      }
    }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🔑 Trocar Senha</div>
        {notice && <div style={{padding:'10px 14px',background:'#fff3cd',color:'#856404',borderRadius:6,fontSize:13,marginBottom:16}}>{notice}</div>}
        {success ? (
          <>
            <div style={{padding:'12px 16px',background:'#d1e7dd',color:'#0f5132',borderRadius:6,fontSize:13,marginBottom:16}}>Senha alterada com sucesso!</div>
            <button className="btn btn-primary" style={{width:'100%'}} onClick={onClose}>Fechar</button>
          </>
        ) : (
          <form onSubmit={submit}>
            {needReauth && (
              <div className="form-group" style={{marginBottom:12}}>
                <label>Senha Atual</label>
                <input type="password" value={currentPwd} onChange={e=>setCurrentPwd(e.target.value)} required autoFocus placeholder="••••••••" />
              </div>
            )}
            <div className="form-group" style={{marginBottom:12}}>
              <label>Nova Senha</label>
              <input type="password" value={newPwd} onChange={e=>setNewPwd(e.target.value)} required autoFocus={!needReauth} placeholder="Mínimo 6 caracteres" />
            </div>
            <div className="form-group" style={{marginBottom:20}}>
              <label>Confirmar Nova Senha</label>
              <input type="password" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)} required placeholder="Repita a nova senha" />
            </div>
            {error && <div className="login-error" style={{marginBottom:12}}>{error}</div>}
            <div className="btn-group">
              <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? 'Salvando...' : 'Salvar Nova Senha'}</button>
              <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

// ============ LOGIN ============
function LoginScreen({ logoB64, darkMode, setDarkMode }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [resetMode, setResetMode] = useState(false);
  const [resetUsername, setResetUsername] = useState('');
  const [resetMsg, setResetMsg] = useState('');
  const [resetError, setResetError] = useState('');

  const login = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const snap = await db.collection('users').where('username', '==', username.trim().toLowerCase()).limit(1).get();
      if (snap.empty) { setError('Usuário ou senha incorretos.'); setLoading(false); return; }
      const email = snap.docs[0].data().email;
      await auth.signInWithEmailAndPassword(email, password);
    } catch(err) {
      console.error('Login error:', err.code, err.message);
      if (err.code==='auth/user-not-found'||err.code==='auth/wrong-password'||err.code==='auth/invalid-credential'||err.code==='auth/invalid-login-credentials'||err.code==='auth/invalid-email')
        setError('Usuário ou senha incorretos.');
      else if (err.code==='auth/too-many-requests')
        setError('Muitas tentativas. Aguarde um momento.');
      else if (err.code==='permission-denied'||err.code==='firestore/permission-denied')
        setError('Erro de permissão no banco. Aguarde alguns instantes e tente novamente.');
      else setError('Erro: ' + (err.message || 'Verifique sua conexão.'));
    }
    setLoading(false);
  };

  const sendReset = async (e) => {
    e.preventDefault();
    setLoading(true); setResetMsg(''); setResetError('');
    try {
      const snap = await db.collection('users').where('username', '==', resetUsername.trim().toLowerCase()).limit(1).get();
      if (snap.empty) { setResetError('Usuário não encontrado.'); setLoading(false); return; }
      const email = snap.docs[0].data().email;
      await auth.sendPasswordResetEmail(email);
      setResetMsg('Email de recuperação enviado para ' + email + '. Verifique sua caixa de entrada.');
    } catch(err) {
      setResetError('Erro ao enviar: ' + (err.message || 'tente novamente.'));
    }
    setLoading(false);
  };

  const header = (
    <>
      {logoB64 ? <img src={`data:image/png;base64,${logoB64}`} alt="Logo" className="login-logo" /> : <div style={{fontSize:40,marginBottom:20}}>🌾</div>}
      <div className="login-title">Centro Oeste Implementos</div>
      <div className="login-sub">Sistema de Propostas Comerciais</div>
      <div style={{textAlign:'center',marginBottom:16}}>
        <button type="button" className="dark-toggle" onClick={()=>setDarkMode(d=>!d)}>
          {darkMode ? '☀️ Claro' : '🌙 Escuro'}
        </button>
      </div>
    </>
  );

  return (
    <div className="login-screen">
      <div className="login-card">
        {header}
        {!resetMode ? (
          <>
            <form className="login-email-form" onSubmit={login}>
              <div className="form-group" style={{marginBottom:12}}>
                <label>Usuário</label>
                <input type="text" value={username} onChange={e=>setUsername(e.target.value.toUpperCase())} placeholder="SEU.USUARIO" required autoFocus autoCorrect="off" />
              </div>
              <div className="form-group" style={{marginBottom:16}}>
                <label>Senha</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required />
              </div>
              {error && <div className="login-error">{error}</div>}
              <button type="submit" className="btn btn-primary" style={{width:'100%'}} disabled={loading}>
                {loading ? 'Entrando...' : 'Entrar'}
              </button>
            </form>
            <div style={{textAlign:'center',marginTop:14}}>
              <button type="button" onClick={()=>{ setResetMode(true); setError(''); setResetUsername(''); setResetMsg(''); setResetError(''); }}
                style={{background:'none',border:'none',color:'var(--verde2)',cursor:'pointer',fontSize:13,textDecoration:'underline',padding:0}}>
                Esqueceu a senha?
              </button>
            </div>
          </>
        ) : (
          <>
            <div style={{textAlign:'center',marginBottom:16,fontWeight:600,fontSize:15,color:'var(--text)'}}>Recuperar Senha</div>
            {resetMsg ? (
              <>
                <div style={{padding:'12px 16px',background:'#d1e7dd',color:'#0f5132',borderRadius:6,fontSize:13,marginBottom:16,lineHeight:1.5}}>{resetMsg}</div>
                <button className="btn btn-outline" style={{width:'100%'}} onClick={()=>{ setResetMode(false); setResetMsg(''); setResetUsername(''); }}>
                  Voltar ao Login
                </button>
              </>
            ) : (
              <form className="login-email-form" onSubmit={sendReset}>
                <div className="form-group" style={{marginBottom:16}}>
                  <label>Usuário</label>
                  <input type="text" value={resetUsername} onChange={e=>setResetUsername(e.target.value.toUpperCase())} placeholder="SEU.USUARIO" required autoFocus autoCorrect="off" />
                </div>
                {resetError && <div className="login-error">{resetError}</div>}
                <div className="btn-group">
                  <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? 'Enviando...' : 'Enviar Email'}</button>
                  <button type="button" className="btn btn-outline" onClick={()=>{ setResetMode(false); setResetError(''); }}>Voltar</button>
                </div>
              </form>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ============ ADMIN PANEL ============
function AdminPanel({ currentUserId }) {
  const [users, setUsers] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name:'', username:'', email:'', password:'', role:'vendedor' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [resetTarget, setResetTarget] = useState(null);
  const [resetLoading, setResetLoading] = useState(false);
  const [resetMsg, setResetMsg] = useState('');
  const [resetNewPwd, setResetNewPwd] = useState('');
  const [resetConfirmPwd, setResetConfirmPwd] = useState('');

  useEffect(() => {
    const unsub = db.collection('users').orderBy('name').onSnapshot(snap => {
      setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    return () => unsub();
  }, []);

  const createUser = async (e) => {
    e.preventDefault();
    setLoading(true); setError(''); setSuccess('');
    try {
      const secondaryApp = firebase.initializeApp(firebase.app().options, 'secondary_' + Date.now());
      const secondaryAuth = secondaryApp.auth();
      const { user } = await secondaryAuth.createUserWithEmailAndPassword(form.email.trim().toLowerCase(), form.password);
      await db.collection('users').doc(user.uid).set({
        name: form.name.trim(),
        username: form.username.trim().toLowerCase(),
        email: form.email.trim().toLowerCase(),
        role: form.role,
        initials: initials(form.name.trim()),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        active: true,
      });
      await secondaryAuth.signOut();
      await secondaryApp.delete();
      setSuccess(`Usuário "${form.name.trim()}" criado com sucesso!`);
      setForm({ name:'', username:'', email:'', password:'', role:'vendedor' });
      setShowForm(false);
    } catch(err) {
      console.error(err);
      if (err.code==='auth/email-already-in-use') setError('Email já cadastrado.');
      else if (err.code==='auth/weak-password') setError('Senha deve ter ao menos 6 caracteres.');
      else setError('Erro: ' + err.message);
    }
    setLoading(false);
  };

  const toggleActive = async (userId, current) => {
    await db.collection('users').doc(userId).update({ active: !current });
  };

  const changeRole = async (userId, newRole) => {
    await db.collection('users').doc(userId).update({ role: newRole });
  };

  const sendAdminReset = async (e) => {
    e.preventDefault();
    if (!resetTarget) return;
    if (resetNewPwd !== resetConfirmPwd) { setResetMsg('erro:As senhas não coincidem.'); return; }
    if (resetNewPwd.length < 6) { setResetMsg('erro:Mínimo 6 caracteres.'); return; }
    setResetLoading(true); setResetMsg('');
    try {
      await db.collection('users').doc(resetTarget.id).update({ forcePassword: resetNewPwd });
      setResetMsg('ok:Senha definida! Será aplicada no próximo login de ' + resetTarget.name + '.');
    } catch(err) {
      setResetMsg('erro:Erro: ' + (err.message || 'tente novamente.'));
    }
    setResetLoading(false);
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">Gerenciamento de Usuários</div>
        <button className="btn btn-primary" onClick={()=>{ setShowForm(true); setError(''); setSuccess(''); }}>
          + Novo Usuário
        </button>
        {success && <div style={{marginTop:12,padding:'10px 14px',background:'#d1e7dd',color:'#0f5132',borderRadius:6,fontSize:13}}>{success}</div>}
      </div>
      <div className="card">
        <div style={{fontSize:12,color:'#888',marginBottom:12}}>{users.length} usuário(s) cadastrado(s)</div>
        {users.map(u => (
          <div key={u.id} className={`user-row ${u.active===false?'user-inactive':''}`}>
            <div className={`user-avatar-sm ${ROLE_AVATAR_CLASS[u.role]||'user-avatar-vendedor'}`} style={{flexShrink:0}}>{u.initials}</div>
            <div style={{flex:1,minWidth:0,overflow:'hidden'}}>
              <div style={{fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:5,flexWrap:'nowrap',overflow:'hidden'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</span>
                {u.active===false && <span style={{fontSize:10,color:'#e74c3c',fontWeight:700,flexShrink:0,whiteSpace:'nowrap'}}>(Inativo)</span>}
                {u.id===currentUserId && <span style={{fontSize:10,color:'var(--text2)',flexShrink:0,whiteSpace:'nowrap'}}>(você)</span>}
              </div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.username ? `@${u.username}` : u.email}</div>
            </div>
            <select value={u.role} disabled={u.id===currentUserId}
              style={{fontSize:12,padding:'4px 8px',border:'1px solid var(--border)',borderRadius:5,background:'var(--bgcard)',color:'var(--text)',flexShrink:0,width:110}}
              onChange={e=>changeRole(u.id, e.target.value)}>
              <option value="vendedor">Vendedor</option>
              <option value="diretoria">Diretoria</option>
              <option value="admin">Admin</option>
            </select>
            <button className="btn btn-sm btn-outline"
              style={{color:'#1a6fa8',borderColor:'#1a6fa8',flexShrink:0}}
              onClick={()=>{ setResetTarget(u); setResetMsg(''); }}
              title="Enviar email de recuperação de senha">
              🔑 Reset Senha
            </button>
            {u.id!==currentUserId && (
              <button className="btn btn-sm btn-outline"
                style={{color:u.active===false?'#27ae60':'#e74c3c',borderColor:u.active===false?'#27ae60':'#e74c3c',flexShrink:0}}
                onClick={()=>toggleActive(u.id, u.active!==false)}>
                {u.active===false?'Ativar':'Desativar'}
              </button>
            )}
          </div>
        ))}
        {users.length===0 && <div style={{textAlign:'center',padding:30,color:'#999'}}>Nenhum usuário cadastrado.</div>}
      </div>
      {resetTarget && (
        <div className="modal-overlay" onClick={()=>{ setResetTarget(null); setResetMsg(''); setResetNewPwd(''); setResetConfirmPwd(''); }}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">🔑 Redefinir Senha</div>
            <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Usuário: <b>{resetTarget.name}</b></p>
            {resetMsg.startsWith('ok:') ? (
              <>
                <div style={{padding:'12px 16px',background:'#d1e7dd',color:'#0f5132',borderRadius:6,fontSize:13,marginBottom:16}}>{resetMsg.slice(3)}</div>
                <button className="btn btn-outline" style={{width:'100%'}} onClick={()=>{ setResetTarget(null); setResetMsg(''); setResetNewPwd(''); setResetConfirmPwd(''); }}>Fechar</button>
              </>
            ) : (
              <form onSubmit={sendAdminReset}>
                <div className="form-group" style={{marginBottom:12}}>
                  <label>Nova Senha</label>
                  <input type="password" value={resetNewPwd} onChange={e=>setResetNewPwd(e.target.value)} required autoFocus minLength={6} placeholder="Mínimo 6 caracteres" />
                </div>
                <div className="form-group" style={{marginBottom:20}}>
                  <label>Confirmar Nova Senha</label>
                  <input type="password" value={resetConfirmPwd} onChange={e=>setResetConfirmPwd(e.target.value)} required placeholder="Repita a senha" />
                </div>
                {resetMsg.startsWith('erro:') && <div className="login-error" style={{marginBottom:12}}>{resetMsg.slice(5)}</div>}
                <div className="btn-group">
                  <button type="submit" className="btn btn-primary" disabled={resetLoading}>{resetLoading ? 'Salvando...' : 'Definir Nova Senha'}</button>
                  <button type="button" className="btn btn-outline" onClick={()=>{ setResetTarget(null); setResetMsg(''); setResetNewPwd(''); setResetConfirmPwd(''); }}>Cancelar</button>
                </div>
              </form>
            )}
          </div>
        </div>
      )}
      {showForm && (
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Criar Novo Usuário</div>
            <form onSubmit={createUser}>
              <div className="form-group" style={{marginBottom:12}}>
                <label>Nome completo</label>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} required autoFocus />
              </div>
              <div className="form-group" style={{marginBottom:12}}>
                <label>Usuário (login)</label>
                <input type="text" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value.toUpperCase()}))} placeholder="EX: JOAO.SILVA" required autoCorrect="off" />
              </div>
              <div className="form-group" style={{marginBottom:12}}>
                <label>Email</label>
                <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} required />
              </div>
              <div className="form-group" style={{marginBottom:12}}>
                <label>Senha (mínimo 6 caracteres)</label>
                <input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} required minLength={6} />
              </div>
              <div className="form-group" style={{marginBottom:20}}>
                <label>Perfil</label>
                <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>

              </div>

// ============ DASHBOARD ============
function Dashboard({proposals, sellers}) {
  const total = proposals.length;
  const aceito = proposals.filter(p=>p.status==='aceito').length;
  const perdido = proposals.filter(p=>p.status==='perdido').length;
  const aguardando = proposals.filter(p=>p.status==='aguardando'||!p.status).length;
  const desistencia = proposals.filter(p=>p.status==='desistencia').length;

  // By seller
  const bySeller = sellers.map(s => ({
    name: s.name.split(' ')[0],
    total: proposals.filter(p=>p.sellerId===s.id).length,
    aceito: proposals.filter(p=>p.sellerId===s.id&&p.status==='aceito').length,
  }));
  const maxSeller = Math.max(...bySeller.map(b=>b.total), 1);

  // By brand/model
  const byModel = {};
  proposals.forEach(p => { if(p.model) { byModel[p.model] = (byModel[p.model]||0)+1; } });
  const modelArr = Object.entries(byModel).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxModel = Math.max(...modelArr.map(m=>m[1]), 1);

  // Value totals
  const propTotal = (p) => {
    if (p.items && p.items.length > 0)
      return p.items.reduce((s,i)=>s+Math.max(0,parseCurrency(i.totalValue)-(i.tradeIns||[]).reduce((ss,t)=>ss+parseCurrency(t.value),0)),0);
    return parseCurrency(p.totalValue);
  };
  const totalValue = proposals.filter(p=>p.status==='aceito').reduce((s,p)=>s+propTotal(p),0);
  const pipeline = proposals.filter(p=>p.status==='aguardando'||!p.status).reduce((s,p)=>s+propTotal(p),0);

  return (
    <div>
      <div className="kpi-grid">
        <div className="kpi-card"><div className="kpi-label">Total de Propostas</div><div className="kpi-value">{total}</div></div>
        <div className="kpi-card"><div className="kpi-label">Aceito / Faturado</div><div className="kpi-value kpi-aceito">{aceito}</div></div>
        <div className="kpi-card vermelho"><div className="kpi-label">Perdidas</div><div className="kpi-value kpi-perdido">{perdido+desistencia}</div></div>
        <div className="kpi-card amarelo"><div className="kpi-label">Aguardando</div><div className="kpi-value kpi-aguardando">{aguardando}</div></div>
        <div className="kpi-card azul"><div className="kpi-label">Valor Fechado</div><div className="kpi-value kpi-azul" style={{fontSize:18}}>{totalValue.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0})}</div></div>
        <div className="kpi-card"><div className="kpi-label">Pipeline</div><div className="kpi-value kpi-amarelo" style={{fontSize:18}}>{pipeline.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0})}</div></div>
      </div>

      {total > 0 && (
        <>
          <div className="card">
            <div className="card-title">Desempenho por Vendedor</div>
            <div className="bar-chart">
              {bySeller.filter(b=>b.total>0).map(b => (
                <div key={b.name} className="bar-row">
                  <div className="bar-label">{b.name}</div>
                  <div className="bar-track"><div className="bar-fill" style={{width:`${b.total/maxSeller*100}%`}}></div></div>
                  <div className="bar-val">{b.total}</div>
                </div>
              ))}
            </div>
          </div>

          {modelArr.length > 0 && (
            <div className="card">
              <div className="card-title">Propostas por Modelo</div>
              <div className="bar-chart">
                {modelArr.map(([model, count]) => (
                  <div key={model} className="bar-row">
                    <div className="bar-label">{model}</div>
                    <div className="bar-track"><div className="bar-fill" style={{width:`${count/maxModel*100}%`, background:'var(--amarelo)'}}></div></div>
                    <div className="bar-val">{count}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="card">
            <div className="card-title">Status das Propostas</div>
            <div className="kpi-grid" style={{marginBottom:0}}>
              <div style={{textAlign:'center'}}><div style={{fontSize:32,fontWeight:800,color:'#0f5132'}}>{aceito}</div><div className="status status-aceito" style={{display:'block',marginTop:4,textAlign:'center'}}>Aceito/Faturado</div></div>
              <div style={{textAlign:'center'}}><div style={{fontSize:32,fontWeight:800,color:'#856404'}}>{aguardando}</div><div className="status status-aguardando" style={{display:'block',marginTop:4,textAlign:'center'}}>Aguardando</div></div>
              <div style={{textAlign:'center'}}><div style={{fontSize:32,fontWeight:800,color:'#c0392b'}}>{perdido}</div><div className="status status-perdido" style={{display:'block',marginTop:4,textAlign:'center'}}>Perdido</div></div>
              <div style={{textAlign:'center'}}><div style={{fontSize:32,fontWeight:800,color:'#41464b'}}>{desistencia}</div><div className="status status-desistencia" style={{display:'block',marginTop:4,textAlign:'center'}}>Desistência</div></div>
            </div>
          </div>
        </>
      )}

      {total === 0 && (
        <div className="card">
          <div className="empty">
            <div className="empty-icon">📊</div>
            <div>Nenhuma proposta ainda.<br/>Crie sua primeira proposta!</div>
          </div>
        </div>
      )}
    </div>
  );
}
